<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Change this to whatever you want the browser tab to say -->
    <title>My Plant Tracker</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- ── HEADER ──────────────────────────────────────
         Edit the text inside <h1> and <p> freely.
    ──────────────────────────────────────────────────── -->
    <header>
        <h1>My Plant Tracker</h1>
        <p>Click a plant to see its progress</p>
    </header>

    <!-- Cards are built automatically by script.js -->
    <div id="plant-container"></div>

    <!-- ── FOOTER ─────────────────────────────────────
         Edit this text freely.
    ──────────────────────────────────────────────────── -->
    <footer>
        <p>My garden journal</p>
    </footer>

    <!-- Load plant data first, then the script -->
    <script src="plants-data.js"></script>
    <script src="script.js"></script>

</body>
</html>
